    <!--
      NOTE ON HERO IMAGE PRELOAD:
      DO NOT preload /src/assets/hero-1.jpg here.

      Reason: After Vite build, assets get content-hashed filenames like
      /assets/hero-1-a3f8c2d1.jpg. The path in index.html becomes wrong,
      so the browser makes TWO requests (one 404, one real) and the preload
      is wasted — actually hurting performance.

      The correct approach: In HeroSlider, add fetchpriority="high" and
      loading="eager" on the first hero <img>. Vite knows the hashed path
      at build time and will correctly set up the connection.
    -->

    <!-- font-display: swap prevents FOIT (flash of invisible text) -->
